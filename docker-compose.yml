name: synccorehub

services:
  # ── PostgreSQL 16 ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: synccorehub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: synccorehub
      POSTGRES_PASSWORD: synccorehub
      POSTGRES_DB: synccorehub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synccorehub"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - synccorehub-network

  # ── Redis 7 ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: synccorehub-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - synccorehub-network

  # ── MinIO (S3-compatible file storage) ────────────────────
  minio:
    image: minio/minio:latest
    container_name: synccorehub-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: synccorehub
      MINIO_ROOT_PASSWORD: synccorehub-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - synccorehub-network

  # ── MinIO bucket setup ────────────────────────────────────
  minio-setup:
    image: minio/mc:latest
    container_name: synccorehub-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 synccorehub synccorehub-secret;
      mc mb --ignore-existing local/synccorehub;
      mc anonymous set download local/synccorehub/public;
      exit 0;
      "
    networks:
      - synccorehub-network

  # ── CRM Web App (apps/web) ────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: synccorehub-web
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://synccorehub:synccorehub@postgres:5432/synccorehub
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_SECRET: dev-secret-change-in-production
      BETTER_AUTH_URL: http://localhost:3000
      PORTAL_URL: http://localhost:3001
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: synccorehub
      S3_SECRET_KEY: synccorehub-secret
      S3_BUCKET: synccorehub
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - synccorehub-network

  # ── Customer Portal (apps/portal) ─────────────────────────
  portal:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
      target: development
    container_name: synccorehub-portal
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://synccorehub:synccorehub@postgres:5432/synccorehub
      REDIS_URL: redis://redis:6379
      PORTAL_AUTH_SECRET: dev-portal-secret-change-in-production
      PORTAL_AUTH_URL: http://localhost:3001
      APP_URL: http://localhost:3000
      NODE_ENV: development
    ports:
      - "3001:3001"
    volumes:
      - ./apps/portal:/app/apps/portal
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/portal/node_modules
      - /app/apps/portal/.next
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - synccorehub-network

  # ── BullMQ Worker ─────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      target: development
    container_name: synccorehub-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://synccorehub:synccorehub@postgres:5432/synccorehub
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    volumes:
      - ./apps/worker:/app/apps/worker
      - ./packages:/app/packages
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - synccorehub-network

  # ── Nginx Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: synccorehub-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - portal
    networks:
      - synccorehub-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  synccorehub-network:
    driver: bridge
